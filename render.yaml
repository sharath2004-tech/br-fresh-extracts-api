services:
  - type: web
    name: br-fresh-extracts-api
    env: node
    rootDir: node_backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: SOURCE_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 1h
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: UPLOAD_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY_PATH
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: TRANSLATE_API_URL
        value: https://libretranslate.com/translate
      - key: TRANSLATE_API_KEY
        sync: false
